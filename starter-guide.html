<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starter Guide - UMKM Starter Hub</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landing.css">
</head>
<body>
    <div id="navbar"></div>
    <section class="page-header">
        <div class="container">
            <div><h1>Starter Guide</h1><p>Panduan langkah demi langkah untuk memulai usahamu.</p></div>
            <div class="page-header-icon">📝</div>
        </div>
    </section>
    <section class="guide-steps">
        <div class="container">
            <div class="steps-grid" id="stepsGrid"></div>
        </div>
    </section>
    <section class="cta-section">
        <div class="container">
            <div class="cta-banner">
                <div class="cta-icon">🧮</div>
                <div class="cta-content">
                    <h2>Sudah Tentukan Produk?</h2>
                    <p>Gunakan kalkulator harga jual untuk menentukan harga yang tepat!</p>
                    <a href="kalkulator.html" class="btn btn-lg">Hitung Harga Jual</a>
                </div>
            </div>
        </div>
    </section>
    <div id="footer"></div>
    <script src="js/app.js"></script>
    <script>
        document.getElementById('navbar').innerHTML = renderNavbar('guide');
        document.getElementById('footer').innerHTML = renderFooter();
        const steps = DB.get('guideSteps') || [];
        document.getElementById('stepsGrid').innerHTML = steps.map((s, i) => `
            <a href="guide-detail.html?step=${s.number}" class="card step-card" style="display:block; text-decoration:none;">
                <div class="step-number">${s.number}</div>
                <div class="step-icon">${s.icon}</div>
                <h4>${s.title}</h4>
                <p>${s.desc}</p>
                <div class="step-toggle-hint" style="color:var(--primary-600); margin-top:1.5rem; font-weight:600; text-transform:uppercase; font-size:0.75rem;">Pelajari Detail →</div>
            </a>
        `).join('');
    </script>
</body>
</html>
