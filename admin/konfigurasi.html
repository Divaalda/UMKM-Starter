<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Konfigurasi - Admin UMKM Starter Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar"></div>
        <main class="admin-main">
            <div id="adminHeader"></div>
            <div class="admin-content">
                <div class="admin-page-header">
                    <h3>⚙️ Konfigurasi Landing Page</h3>
                    <p style="color:var(--neutral-500);font-size:0.9rem;">Pengaturan konten yang ditampilkan di landing page</p>
                </div>

                <!-- General -->
                <div class="config-section">
                    <h4>🏪 Pengaturan Umum</h4>
                    <div class="form-group">
                        <label class="form-label">Nama Website</label>
                        <input type="text" class="form-control" id="cfgSiteName">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tagline</label>
                        <input type="text" class="form-control" id="cfgTagline">
                    </div>
                    <div class="config-actions"><button class="btn btn-primary btn-sm" onclick="saveSection('general')">💾 Simpan</button></div>
                </div>

                <!-- Hero -->
                <div class="config-section">
                    <h4>🖼️ Hero Section</h4>
                    <div class="form-group">
                        <label class="form-label">Judul Hero</label>
                        <input type="text" class="form-control" id="cfgHeroTitle">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Sub-judul Hero</label>
                        <textarea class="form-control" id="cfgHeroSubtitle" rows="3"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teks Tombol CTA</label>
                        <input type="text" class="form-control" id="cfgHeroCta">
                    </div>
                    <div class="config-actions"><button class="btn btn-primary btn-sm" onclick="saveSection('hero')">💾 Simpan</button></div>
                </div>

                <!-- CTA Banner -->
                <div class="config-section">
                    <h4>📣 CTA Banner Section</h4>
                    <div class="form-group">
                        <label class="form-label">Judul CTA</label>
                        <input type="text" class="form-control" id="cfgCtaTitle">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Deskripsi CTA</label>
                        <textarea class="form-control" id="cfgCtaDesc" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Teks Tombol CTA</label>
                        <input type="text" class="form-control" id="cfgCtaCta">
                    </div>
                    <div class="config-actions"><button class="btn btn-primary btn-sm" onclick="saveSection('cta')">💾 Simpan</button></div>
                </div>

                <!-- Footer -->
                <div class="config-section">
                    <h4>📋 Footer</h4>
                    <div class="form-group">
                        <label class="form-label">Deskripsi Footer</label>
                        <textarea class="form-control" id="cfgFooterDesc" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Link Instagram</label>
                        <input type="text" class="form-control" id="cfgSocialIG" placeholder="https://instagram.com/...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Link YouTube</label>
                        <input type="text" class="form-control" id="cfgSocialYT" placeholder="https://youtube.com/...">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Link WhatsApp</label>
                        <input type="text" class="form-control" id="cfgSocialWA" placeholder="https://wa.me/...">
                    </div>
                    <div class="config-actions"><button class="btn btn-primary btn-sm" onclick="saveSection('footer')">💾 Simpan</button></div>
                </div>

                <!-- Reset -->
                <div class="config-section" style="border:2px dashed var(--color-danger);">
                    <h4 style="color:var(--color-danger);">⚠️ Zona Berbahaya</h4>
                    <p style="font-size:0.9rem;margin-bottom:1rem;">Reset semua data ke pengaturan awal. Semua perubahan yang telah dibuat akan hilang.</p>
                    <button class="btn btn-danger btn-sm" onclick="resetAll()">🔄 Reset Semua Data</button>
                </div>
            </div>
        </main>
    </div>
    <script src="../js/app.js"></script>
    <script>
        if (!checkAuth()) throw 'Not authenticated';
        document.getElementById('sidebar').innerHTML = renderSidebar('config');
        document.getElementById('adminHeader').innerHTML = renderAdminHeader('Konfigurasi');

        function loadConfig() {
            const c = DB.get('config') || {};
            document.getElementById('cfgSiteName').value = c.siteName || '';
            document.getElementById('cfgTagline').value = c.tagline || '';
            document.getElementById('cfgHeroTitle').value = c.heroTitle || '';
            document.getElementById('cfgHeroSubtitle').value = c.heroSubtitle || '';
            document.getElementById('cfgHeroCta').value = c.heroCta || '';
            document.getElementById('cfgCtaTitle').value = c.ctaTitle || '';
            document.getElementById('cfgCtaDesc').value = c.ctaDesc || '';
            document.getElementById('cfgCtaCta').value = c.ctaCta || '';
            document.getElementById('cfgFooterDesc').value = c.footerDesc || '';
            document.getElementById('cfgSocialIG').value = c.socialIG || '';
            document.getElementById('cfgSocialYT').value = c.socialYT || '';
            document.getElementById('cfgSocialWA').value = c.socialWA || '';
        }

        function saveSection(section) {
            const c = DB.get('config') || {};
            if (section === 'general') {
                c.siteName = document.getElementById('cfgSiteName').value;
                c.tagline = document.getElementById('cfgTagline').value;
            } else if (section === 'hero') {
                c.heroTitle = document.getElementById('cfgHeroTitle').value;
                c.heroSubtitle = document.getElementById('cfgHeroSubtitle').value;
                c.heroCta = document.getElementById('cfgHeroCta').value;
            } else if (section === 'cta') {
                c.ctaTitle = document.getElementById('cfgCtaTitle').value;
                c.ctaDesc = document.getElementById('cfgCtaDesc').value;
                c.ctaCta = document.getElementById('cfgCtaCta').value;
            } else if (section === 'footer') {
                c.footerDesc = document.getElementById('cfgFooterDesc').value;
                c.socialIG = document.getElementById('cfgSocialIG').value;
                c.socialYT = document.getElementById('cfgSocialYT').value;
                c.socialWA = document.getElementById('cfgSocialWA').value;
            }
            DB.set('config', c);
            showToast('Konfigurasi berhasil disimpan! Perubahan akan tampil di landing page.');
        }

        function resetAll() {
            if (!confirm('Yakin ingin reset semua data ke pengaturan awal? Tindakan ini tidak bisa dibatalkan!')) return;
            DB.remove('initialized');
            DB.remove('config'); DB.remove('products'); DB.remove('seminars');
            DB.remove('guideSteps'); DB.remove('stats'); DB.remove('activities');
            initSeedData();
            loadConfig();
            showToast('Semua data berhasil direset!');
        }

        loadConfig();
    </script>
</body>
</html>
