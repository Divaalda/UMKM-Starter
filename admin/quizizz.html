<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Quizizz - Admin UMKM Starter Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar"></div>
        <main class="admin-main">
            <div id="adminHeader"></div>
            <div class="admin-content">
                <div class="admin-page-header">
                    <h3>❓ Daftar Soal Quizizz</h3>
                    <button class="btn btn-primary" onclick="openModal()">+ Tambah Quiz</button>
                </div>
                <div class="table-wrapper">
                    <table>
                        <thead><tr><th>No</th><th>Judul Quiz</th><th>Tingkat</th><th>Link Quizizz</th><th>Aksi</th></tr></thead>
                        <tbody id="quizTable"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">Tambah Quiz</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <form onsubmit="saveQuiz(event)">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label class="form-label">Judul Quiz</label>
                    <input type="text" class="form-control" id="qTitle" required placeholder="Contoh: Quiz Dasar UMKM">
                </div>
                <div class="form-group">
                    <label class="form-label">Tingkat Kesulitan</label>
                    <select class="form-control" id="qDifficulty">
                        <option>Mudah</option><option>Menengah</option><option>Sulit</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Link Quizizz</label>
                    <input type="url" class="form-control" id="qLink" required placeholder="https://quizizz.com/join?...">
                </div>
                <div class="form-group">
                    <label class="form-label">Deskripsi Singkat</label>
                    <textarea class="form-control" id="qDesc" rows="3" required placeholder="Quiz ini tentang apa..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Batal</button>
                    <button type="submit" class="btn btn-primary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/app.js"></script>
    <script>
        if (!checkAuth()) throw 'Not authenticated';
        document.getElementById('sidebar').innerHTML = renderSidebar('quiz');
        document.getElementById('adminHeader').innerHTML = renderAdminHeader('Kelola Quizizz');

        function loadTable() {
            const quizzes = DB.get('quizzes') || [];
            document.getElementById('quizTable').innerHTML = quizzes.map((q, i) => `<tr>
                <td>${i + 1}</td>
                <td><strong>${q.title}</strong><br><small style="color:var(--neutral-500)">${q.desc || ''}</small></td>
                <td>
                    <span class="badge ${q.difficulty === 'Mudah' ? 'badge-success' : q.difficulty === 'Menengah' ? 'badge-warning' : 'badge-danger'}">${q.difficulty}</span>
                </td>
                <td><a href="${q.link}" target="_blank" style="color:var(--primary-600); text-decoration:underline;">Buka Quizizz</a></td>
                <td>
                    <div class="flex gap-1">
                        <button class="btn btn-sm btn-secondary" onclick="editQuiz('${q.id}')">✏️ Edit</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteQuiz('${q.id}')">🗑️</button>
                    </div>
                </td>
            </tr>`).join('');
        }

        function openModal(id) {
            document.getElementById('modalOverlay').classList.add('active');
            document.getElementById('modalTitle').textContent = id ? 'Edit Quiz' : 'Tambah Quiz';
            if (!id) { document.getElementById('editId').value = ''; document.querySelector('#modalOverlay form').reset(); }
        }
        function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }

        function editQuiz(id) {
            const quizzes = DB.get('quizzes') || [];
            const q = quizzes.find(x => x.id === id);
            if (!q) return;
            document.getElementById('editId').value = q.id;
            document.getElementById('qTitle').value = q.title;
            document.getElementById('qDifficulty').value = q.difficulty;
            document.getElementById('qLink').value = q.link;
            document.getElementById('qDesc').value = q.desc || '';
            openModal(id);
        }

        function saveQuiz(e) {
            e.preventDefault();
            const quizzes = DB.get('quizzes') || [];
            const editId = document.getElementById('editId').value;
            const data = {
                id: editId || genId(),
                title: document.getElementById('qTitle').value,
                difficulty: document.getElementById('qDifficulty').value,
                link: document.getElementById('qLink').value,
                desc: document.getElementById('qDesc').value
            };
            if (editId) { 
                const idx = quizzes.findIndex(x => x.id === editId); 
                if (idx >= 0) quizzes[idx] = data; 
            } else { 
                quizzes.push(data); 
            }
            DB.set('quizzes', quizzes);
            closeModal(); loadTable();
            showToast(editId ? 'Quiz diperbarui!' : 'Quiz ditambahkan!');
        }

        function deleteQuiz(id) {
            if (!confirm('Hapus quiz ini?')) return;
            DB.set('quizzes', (DB.get('quizzes') || []).filter(x => x.id !== id));
            loadTable();
            showToast('Quiz dihapus!', 'error');
        }
        
        loadTable();
    </script>
</body>
</html>
