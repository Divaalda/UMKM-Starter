<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Starter Guide - Admin UMKM Starter Hub</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="admin-layout">
        <div id="sidebar"></div>
        <main class="admin-main">
            <div id="adminHeader"></div>
            <div class="admin-content">
                <div class="admin-page-header">
                    <h3>📖 Kelola Starter Guide</h3>
                    <p style="color:var(--neutral-500);font-size:0.9rem;">Edit langkah-langkah panduan yang ditampilkan di halaman Starter Guide</p>
                </div>
                <div id="guideList"></div>
            </div>
        </main>
    </div>
    <script src="../js/app.js"></script>
    <script>
        if (!checkAuth()) throw 'Not authenticated';
        document.getElementById('sidebar').innerHTML = renderSidebar('guide');
        document.getElementById('adminHeader').innerHTML = renderAdminHeader('Kelola Starter Guide');

        function loadGuide() {
            const steps = DB.get('guideSteps') || [];
            document.getElementById('guideList').innerHTML = steps.map(s => `
                <div class="config-section">
                    <h4><span style="display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:var(--primary-600);color:#fff;font-size:0.8rem;margin-right:0.5rem;">${s.number}</span> Langkah ${s.number}</h4>
                    <div class="form-group">
                        <label class="form-label">Ikon (Emoji)</label>
                        <input type="text" class="form-control" id="gIcon${s.id}" value="${s.icon}" style="max-width:120px;">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Judul</label>
                        <input type="text" class="form-control" id="gTitle${s.id}" value="${s.title}">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Deskripsi</label>
                        <textarea class="form-control" id="gDesc${s.id}" rows="2">${s.desc}</textarea>
                    </div>
                    <div class="config-actions">
                        <button class="btn btn-primary btn-sm" onclick="saveStep('${s.id}')">💾 Simpan Langkah ${s.number}</button>
                    </div>
                </div>
            `).join('');
        }

        function saveStep(id) {
            const steps = DB.get('guideSteps') || [];
            const idx = steps.findIndex(x => x.id === id);
            if (idx < 0) return;
            steps[idx].icon = document.getElementById('gIcon' + id).value;
            steps[idx].title = document.getElementById('gTitle' + id).value;
            steps[idx].desc = document.getElementById('gDesc' + id).value;
            DB.set('guideSteps', steps);
            showToast('Langkah ' + steps[idx].number + ' berhasil disimpan!');
        }

        loadGuide();
    </script>
</body>
</html>
